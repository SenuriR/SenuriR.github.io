<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senuri Rupasinghe</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css" />
  <link rel="icon" type="image/x-icon" href="images/coca-leaves.png">

  <style>
    .wave-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 220px;
      pointer-events: none;
      z-index: 0;
    }

    #wave-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    nav, .hero {
      position: relative;
      z-index: 10;
    }

    @media (prefers-reduced-motion: reduce) {
      .wave-container { display: none; }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">SR</div>
    <div class="nav-items">
      <a href="about.html">About</a>
      <a href="my_work.html">Work</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div class="container">
      <br><br><br>
      <h1>Senuri Rupasinghe</h1>
      <p class="tagline">
        Exploring quantum computation and simulation at the boundary of physics, intelligent systems, and applied engineering.
      </p>
    </div>
  </section>

  <div class="wave-container" aria-hidden="true">
    <canvas id="wave-canvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H, t = 0;

    function resize() {
      W = canvas.offsetWidth;
      H = canvas.offsetHeight;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const cy = H / 2;

      // dashed baseline
      ctx.beginPath();
      ctx.strokeStyle = '#2B6CFF';
      ctx.globalAlpha = 0.1;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 7]);
      ctx.moveTo(0, cy);
      ctx.lineTo(W, cy);
      ctx.stroke();
      ctx.setLineDash([]);

      // three superimposed wave modes
      const waves = [
        { freq: 1.2, amp: 55, speed: 0.0007, alpha: 0.65, width: 1.8 },
        { freq: 2.1, amp: 30, speed: 0.0011, alpha: 0.30, width: 1.2 },
        { freq: 3.4, amp: 18, speed: 0.0016, alpha: 0.15, width: 1.0 },
      ];

      for (const w of waves) {
        ctx.beginPath();
        ctx.strokeStyle = '#2B6CFF';
        ctx.globalAlpha = w.alpha;
        ctx.lineWidth = w.width;

        for (let x = 0; x <= W; x++) {
          const env = Math.exp(-Math.pow((x / W - 0.5) * 2.8, 2));
          const y = cy + w.amp * env * Math.sin(w.freq * (x / W) * Math.PI * 2 - t * w.speed * 60);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      t++;
      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', () => { resize(); });
    draw();
  </script>

</body>
</html>
